name : Deploy to Hetzner Bare Metal

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-hetzner-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build_check:
    uses: ./.github/workflows/build.yml
    with:
      publish-artifact: true
    secrets: inherit
  
  build-and-push:
    name: Build and Push Docker Images
    needs: build_check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-musl

      - name: Make binary executable
        run: chmod +x target/x86_64-unknown-linux-musl/release/yral-metadata-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for yral-metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest

      - name: Build and push yral-metadata-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner Bare Metal
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - name: yral-metadata-1
            host: 138.201.32.116
          - name: yral-metadata-2
            host: 49.12.120.32
      max-parallel: 1
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BARE_METAL_GITHUB_ACTIONS_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{matrix.server.host}} >> ~/.ssh/known_hosts

      - name: Check server connectivity
        run: |
          ssh -o ConnectTimeout=10 root@${{matrix.server.host}} "echo 'Server connection successful'"

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://vault.yral.com
          method: jwt
          role: yral-metadata-role
          jwtGithubAudience: "https://github.com/dolr-ai"
          secrets: |
            secret/data/yral-metadata/YRAL_METADATA_USER_NOTIFICATION_API_KEY value | YRAL_METADATA_USER_NOTIFICATION_API_KEY ;
            secret/data/yral-metadata/YRAL_AUTH_METADATA_SERVICE_ACCESS_PUBLIC_KEY value | JWT_PUBLIC_KEY ;
            secret/data/yral-metadata/CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY value | CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY ;
            secret/data/yral-metadata/YRAL_APP_ADMIN_AND_PROPOSAL_SUBMITTER_DFX_IDENTITY_SECP_PRIVATE_KEY value | BACKEND_ADMIN_IDENTITY ;
            secret/data/yral-metadata/YRAL_AUTH_JWT_VERIFY_PUBLIC_KEY value | YRAL_AUTH_PUBLIC_KEY ;
            secret/data/yral-metadata/GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID value | GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID ;
            secret/data/yral-metadata/GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID value | GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID ;
            secret/data/yral-metadata/QSTASH_CURRENT_SIGNING_KEY value | QSTASH_CURRENT_SIGNING_KEY ;
            secret/data/yral-metadata/QSTASH_NEXT_SIGNING_KEY value | QSTASH_NEXT_SIGNING_KEY ;
            secret/data/yral-metadata/DRAGONFLY_REDIS_STORE_PASSWORD value | DRAGONFLY_REDIS_STORE_PASSWORD ;
            secret/data/yral-metadata/DRAGONFLY_REDIS_STORE_HOSTS value | DRAGONFLY_REDIS_STORE_HOSTS ;
            secret/data/yral-metadata/DRAGONFLY_REDIS_STORE_CA_CERT value | DRAGONFLY_REDIS_STORE_CA_CERT ;
            secret/data/yral-metadata/DRAGONFLY_REDIS_STORE_CLIENT_CERT value | DRAGONFLY_REDIS_STORE_CLIENT_CERT ;
            secret/data/yral-metadata/DRAGONFLY_REDIS_STORE_CLIENT_KEY value | DRAGONFLY_REDIS_STORE_CLIENT_KEY ;
            secret/data/DRAGONFLY_CLUSTER_2_PASSWORD value | DRAGONFLY_PASSWORD ;
            secret/data/DRAGONFLY_CLUSTER_2_HOSTS value | DRAGONFLY_HOSTS ;
            secret/data/DRAGONFLY_CLUSTER_2_CA_CERT value | DRAGONFLY_CA_CERT ;
            secret/data/DRAGONFLY_CLUSTER_2_CLIENT_CERT value | DRAGONFLY_CLIENT_CERT ;
            secret/data/DRAGONFLY_CLUSTER_2_CLIENT_KEY value | DRAGONFLY_CLIENT_KEY ;

      - name: Sync deployment files to server
        run: |
          rsync -avz --delete \
            ./deploy/ \
            root@${{matrix.server.host}}:/home/yral-metadata/

      - name: Log in to GitHub Container Registry on server
        run: |
          ssh root@${{matrix.server.host}} "
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          "

      - name: Deploy to ${{ matrix.server.name }} with docker compose
        env:
          SERVER_HOST: ${{ matrix.server.host }}
          SERVER_USER: root
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_PUBLIC_KEY: ${{ env.JWT_PUBLIC_KEY }}
          YRAL_METADATA_USER_NOTIFICATION_API_KEY: ${{ env.YRAL_METADATA_USER_NOTIFICATION_API_KEY }}
          CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY: ${{ env.CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID: ${{ env.GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID }}
          BACKEND_ADMIN_IDENTITY: ${{ env.BACKEND_ADMIN_IDENTITY }}
          YRAL_AUTH_PUBLIC_KEY: ${{ env.YRAL_AUTH_PUBLIC_KEY }}
          GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID: ${{ env.GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ env.QSTASH_CURRENT_SIGNING_KEY }}
          QSTASH_NEXT_SIGNING_KEY: ${{ env.QSTASH_NEXT_SIGNING_KEY }}
          DRAGONFLY_PASSWORD: ${{ env.DRAGONFLY_PASSWORD }}
          DRAGONFLY_HOSTS: ${{ env.DRAGONFLY_HOSTS }}
          DRAGONFLY_CA_CERT: ${{ env.DRAGONFLY_CA_CERT }}
          DRAGONFLY_CLIENT_CERT: ${{ env.DRAGONFLY_CLIENT_CERT }}
          DRAGONFLY_CLIENT_KEY: ${{ env.DRAGONFLY_CLIENT_KEY }}
          DRAGONFLY_REDIS_STORE_PASSWORD: ${{ env.DRAGONFLY_REDIS_STORE_PASSWORD }}
          DRAGONFLY_REDIS_STORE_HOSTS: ${{ env.DRAGONFLY_REDIS_STORE_HOSTS }}
          DRAGONFLY_REDIS_STORE_CA_CERT: ${{ env.DRAGONFLY_REDIS_STORE_CA_CERT }}
          DRAGONFLY_REDIS_STORE_CLIENT_CERT: ${{ env.DRAGONFLY_REDIS_STORE_CLIENT_CERT }}
          DRAGONFLY_REDIS_STORE_CLIENT_KEY: ${{ env.DRAGONFLY_REDIS_STORE_CLIENT_KEY }}
        run: |
          # Create deployment directory if not exists
          ssh $SERVER_USER@$SERVER_HOST "mkdir -p /home/yral-metadata"
          
          ssh $SERVER_USER@$SERVER_HOST "
            cd /home/yral-metadata
            
            echo 'Pulling latest images...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            docker compose pull
            
            echo 'Stopping existing containers...'
            docker compose down --remove-orphans || true
            
            echo 'Starting services...'
            APP_IMAGE=ghcr.io/${{ github.repository }} \
            IMAGE_TAG=${{ github.sha }} \
            BIND_ADDRESS=0.0.0.0:8080 \
            JWT_PUBLIC_KEY='$JWT_PUBLIC_KEY' \
            YRAL_METADATA_USER_NOTIFICATION_API_KEY='$YRAL_METADATA_USER_NOTIFICATION_API_KEY' \
            CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY='$CLIENT_NOTIFICATIONS_GOOGLE_SERVICE_ACCOUNT_KEY' \
            GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID='$GOOGLE_CLIENT_NOTIFICATIONS_PROJECT_ID' \
            BACKEND_ADMIN_IDENTITY='$BACKEND_ADMIN_IDENTITY' \
            YRAL_AUTH_PUBLIC_KEY='$YRAL_AUTH_PUBLIC_KEY' \
            GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID='$GOOGLE_CLIENT_NOTIFICATIONS_SENDER_ID' \
            QSTASH_CURRENT_SIGNING_KEY='$QSTASH_CURRENT_SIGNING_KEY' \
            QSTASH_NEXT_SIGNING_KEY='$QSTASH_NEXT_SIGNING_KEY' \
            DRAGONFLY_PASSWORD='$DRAGONFLY_PASSWORD' \
            DRAGONFLY_HOSTS='$DRAGONFLY_HOSTS' \
            DRAGONFLY_CA_CERT='$DRAGONFLY_CA_CERT' \
            DRAGONFLY_CLIENT_CERT='$DRAGONFLY_CLIENT_CERT' \
            DRAGONFLY_CLIENT_KEY='$DRAGONFLY_CLIENT_KEY' \
            DRAGONFLY_REDIS_STORE_PASSWORD='$DRAGONFLY_REDIS_STORE_PASSWORD' \
            DRAGONFLY_REDIS_STORE_HOSTS='$DRAGONFLY_REDIS_STORE_HOSTS' \
            DRAGONFLY_REDIS_STORE_CA_CERT='$DRAGONFLY_REDIS_STORE_CA_CERT' \
            DRAGONFLY_REDIS_STORE_CLIENT_CERT='$DRAGONFLY_REDIS_STORE_CLIENT_CERT' \
            DRAGONFLY_REDIS_STORE_CLIENT_KEY='$DRAGONFLY_REDIS_STORE_CLIENT_KEY' \
            docker compose up -d

            echo 'Waiting for services to start...'
            sleep 15
            echo 'Services status:'
            docker compose ps
          "
      
      - name: Verify deployment
        run: |
          ssh root@${{ matrix.server.host }} "
            cd /home/yral-metadata
            echo '=== Container Status ==='
            docker compose ps
            echo ''
            echo '=== Container Logs (last 20 lines) ==='
            docker compose logs --tail=20 yral-metadata 2>/dev/null || echo 'Logs not yet available'
          "

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Server**: ${{ matrix.server.host }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment Method**: Docker Compose" >> $GITHUB_STEP_SUMMARY
          echo "- **Images**:" >> $GITHUB_STEP_SUMMARY
          echo "  - ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Services**: yral-metadata, caddy" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets**: Injected via environment variables at runtime" >> $GITHUB_STEP_SUMMARY
      
      - name: Wait before next server
        run: |
          echo "Waiting 30 seconds before deploying to next server..."
          sleep 30